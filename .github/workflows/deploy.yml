name: Deploy Next.js to Server

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts
          
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          timeout: 5m
          script: |
            cd /Termin-Demo
            git pull 
            npm install
            npm run build
            pm2 delete Termin-Demo || true
            PORT=4800 pm2 start /Termin-Demo/node_modules/next/dist/bin/next --name "Termin-Demo" -- start 
            pm2 save